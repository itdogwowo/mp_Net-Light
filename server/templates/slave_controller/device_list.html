{% extends 'base.html' %}
{% load static %}

{% block title %}{{ title }} - mp_Net-Light{% endblock %}

{% block content %}
<div style="padding: 20px; max-width: 1200px; margin: 0 auto;">
    <h1 style="color: #fff; margin-bottom: 20px;">
        🎛️ Slave Controller - 設備列表
    </h1>

    <!-- 控制面板 -->
    <div style="background: #1f2937; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
        <!-- 🔥 發現設備按鈕 -->
        <button id="discoverBtn" style="
            background: #059669;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        ">
            📡 發現設備
        </button>
        
        <button id="refreshBtn" style="
            background: #1e40af;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        ">
            🔄 刷新列表
        </button>
        
        <span id="deviceCount" style="color: #9ca3af; margin-left: 20px;">
            未掃描
        </span>
    </div>

    <!-- 設備列表 -->
    <div id="deviceList" style="
        background: #1f2937;
        border-radius: 8px;
        padding: 20px;
    ">
        <p style="color: #6b7280;">點擊 "發現設備" 開始掃描...</p>
    </div>
</div>

<!-- 🔥 文件上傳對話框 -->
<div id="uploadDialog" style="
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #1f2937;
    border: 1px solid #374151;
    border-radius: 8px;
    padding: 20px;
    min-width: 400px;
    z-index: 1000;
">
    <h3 style="color: #f3f4f6; margin-top: 0;">📤 上傳文件到 Slave <span id="uploadSlaveId"></span></h3>
    
    <div style="margin-bottom: 15px;">
        <label style="color: #9ca3af; display: block; margin-bottom: 5px;">選擇文件:</label>
        <input type="file" id="fileInput" style="
            background: #111827;
            color: #f3f4f6;
            padding: 8px;
            border: 1px solid #374151;
            border-radius: 4px;
            width: 100%;
        ">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="color: #9ca3af; display: block; margin-bottom: 5px;">目標路徑:</label>
        <input type="text" id="targetPath" value="/uploaded_file.bin" style="
            background: #111827;
            color: #f3f4f6;
            padding: 8px;
            border: 1px solid #374151;
            border-radius: 4px;
            width: 100%;
        ">
    </div>
    
    <div style="display: flex; gap: 10px;">
        <button id="uploadBtn" style="
            flex: 1;
            background: #1e40af;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
        ">
            📤 開始上傳
        </button>
        
        <button id="cancelUploadBtn" style="
            flex: 1;
            background: #374151;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
        ">
            ❌ 取消
        </button>
    </div>
    
    <div id="uploadProgress" style="margin-top: 15px; color: #9ca3af; display: none;">
        <div style="background: #111827; height: 20px; border-radius: 4px; overflow: hidden;">
            <div id="uploadProgressBar" style="
                background: #059669;
                height: 100%;
                width: 0%;
                transition: width 0.3s;
            "></div>
        </div>
        <p id="uploadStatus" style="margin-top: 5px; font-size: 12px;"></p>
    </div>
</div>

<!-- 背景遮罩 -->
<div id="uploadOverlay" style="
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 999;
"></div>

<script>
let currentSlaveId = null;

// 🔥 發現設備按鈕
document.getElementById('discoverBtn').addEventListener('click', async () => {
    const btn = document.getElementById('discoverBtn');
    btn.disabled = true;
    btn.textContent = '🔍 掃描中...';
    
    try {
        const response = await fetch('/slave/api/discover/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken')
            }
        });
        
        const data = await response.json();
        
        if (data.ok) {
            document.getElementById('deviceCount').textContent = '等待設備回應...';
            // 等待 2 秒讓設備回應
            setTimeout(() => {
                loadDevices();
                btn.disabled = false;
                btn.textContent = '📡 發現設備';
            }, 2000);
        } else {
            alert(`發現失敗: ${data.err}`);
            btn.disabled = false;
            btn.textContent = '📡 發現設備';
        }
    } catch (error) {
        alert(`發現失敗: ${error.message}`);
        btn.disabled = false;
        btn.textContent = '📡 發現設備';
    }
});

// 刷新列表按鈕
document.getElementById('refreshBtn').addEventListener('click', loadDevices);

async function loadDevices() {
    try {
        const response = await fetch('/slave/api/devices/');
        const data = await response.json();
        
        if (data.ok) {
            displayDevices(data.devices, data.count);
        }
    } catch (error) {
        console.error('載入設備失敗:', error);
        document.getElementById('deviceList').innerHTML = `
            <p style="color: #dc2626;">❌ 載入失敗: ${error.message}</p>
        `;
    }
}

function displayDevices(devices, count) {
    const deviceListEl = document.getElementById('deviceList');
    const deviceCountEl = document.getElementById('deviceCount');
    
    deviceCountEl.textContent = `共發現 ${count} 個設備`;
    
    if (count === 0) {
        deviceListEl.innerHTML = `
            <p style="color: #6b7280;">
                📡 未發現任何設備<br>
                <small>請確保 ESP32-P4 已連接到相同網段並啟動 UDP 響應器</small>
            </p>
        `;
        return;
    }
    
    // 生成設備卡片
    let html = '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;">';
    
    for (const [slaveId, device] of Object.entries(devices)) {
        const statusColor = device.ws_connected ? '#059669' : '#d97706';
        const statusText = device.ws_connected ? 'online' : device.status;
        
        html += `
            <div style="
                background: #111827;
                border: 1px solid #374151;
                border-radius: 8px;
                padding: 15px;
            ">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="color: #f3f4f6; margin: 0;">
                        Slave ${slaveId}
                    </h3>
                    <span style="
                        background: ${statusColor};
                        color: white;
                        padding: 3px 8px;
                        border-radius: 4px;
                        font-size: 12px;
                    ">
                        ${statusText}
                    </span>
                </div>
                
                <div style="color: #9ca3af; font-size: 14px; line-height: 1.6;">
                    <div>📍 IP: <code style="color: #60a5fa;">${device.ip}</code></div>
                    <div>💡 像素數: <code>${device.pixel_count}</code></div>
                    <div>🔧 硬體版本: <code>${device.hw_version}</code></div>
                    <div>🕐 最後上線: <code style="font-size: 11px;">${new Date(device.last_seen).toLocaleString()}</code></div>
                </div>
                
                <div style="margin-top: 15px; display: flex; gap: 8px;">
                    <button onclick="connectDevice('${slaveId}')" style="
                        flex: 1;
                        background: ${device.ws_connected ? '#374151' : '#1e40af'};
                        color: white;
                        border: none;
                        padding: 8px;
                        border-radius: 4px;
                        cursor: pointer;
                        font-size: 13px;
                    " ${device.ws_connected ? 'disabled' : ''}>
                        ${device.ws_connected ? '✅ 已連接' : '🔗 連接'}
                    </button>
                    
                    <button onclick="uploadFile('${slaveId}')" style="
                        flex: 1;
                        background: #059669;
                        color: white;
                        border: none;
                        padding: 8px;
                        border-radius: 4px;
                        cursor: pointer;
                        font-size: 13px;
                    ">
                        📤 上傳
                    </button>
                </div>
            </div>
        `;
    }
    
    html += '</div>';
    deviceListEl.innerHTML = html;
}

// 🔥 連接設備功能
async function connectDevice(slaveId) {
    if (!confirm(`確定要連接 Slave ${slaveId} 到 WebSocket 嗎?`)) return;
    
    try {
        const response = await fetch('/slave/api/device/connect/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({
                slave_id: slaveId
            })
        });
        
        const data = await response.json();
        
        if (data.ok) {
            alert(`✅ 已發送連接指令到 Slave ${slaveId}`);
            // 刷新設備列表
            setTimeout(loadDevices, 1000);
        } else {
            alert(`❌ 連接失敗: ${data.err}`);
        }
    } catch (error) {
        alert(`❌ 連接失敗: ${error.message}`);
    }
}

// 🔥 上傳文件功能
function uploadFile(slaveId) {
    currentSlaveId = slaveId;
    document.getElementById('uploadSlaveId').textContent = slaveId;
    document.getElementById('uploadDialog').style.display = 'block';
    document.getElementById('uploadOverlay').style.display = 'block';
}

// 上傳按鈕事件
document.getElementById('uploadBtn').addEventListener('click', async () => {
    const fileInput = document.getElementById('fileInput');
    const targetPath = document.getElementById('targetPath').value;
    
    if (!fileInput.files.length) {
        alert('請選擇文件');
        return;
    }
    
    const file = fileInput.files[0];
    const reader = new FileReader();
    
    reader.onload = async (e) => {
        const arrayBuffer = e.target.result;
        const bytes = new Uint8Array(arrayBuffer);
        
        // 顯示進度條
        document.getElementById('uploadProgress').style.display = 'block';
        
        try {
            const response = await fetch('/slave/api/file/upload/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    slave_id: currentSlaveId,
                    filename: targetPath,
                    data: Array.from(bytes)
                })
            });
            
            const data = await response.json();
            
            if (data.ok) {
                document.getElementById('uploadStatus').textContent = '✅ 上傳成功';
                setTimeout(() => {
                    closeUploadDialog();
                }, 1500);
            } else {
                document.getElementById('uploadStatus').textContent = `❌ 上傳失敗: ${data.err}`;
            }
        } catch (error) {
            document.getElementById('uploadStatus').textContent = `❌ 上傳失敗: ${error.message}`;
        }
    };
    
    reader.readAsArrayBuffer(file);
});

// 取消按鈕
document.getElementById('cancelUploadBtn').addEventListener('click', closeUploadDialog);
document.getElementById('uploadOverlay').addEventListener('click', closeUploadDialog);

function closeUploadDialog() {
    document.getElementById('uploadDialog').style.display = 'none';
    document.getElementById('uploadOverlay').style.display = 'none';
    document.getElementById('uploadProgress').style.display = 'none';
    document.getElementById('fileInput').value = '';
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// 頁面載入時執行一次
document.addEventListener('DOMContentLoaded', () => {
    loadDevices();
});
</script>
{% endblock %}
