<!-- slave_controller/templates/slave_controller/device_list.html -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slave Controller - 設備管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
        }
        
        .controls {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .device-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .device-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }
        
        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .device-id {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            font-family: 'Courier New', monospace;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-discovered {
            background: #ffc107;
            color: #856404;
        }
        
        .status-online {
            background: #28a745;
            color: white;
        }
        
        .status-offline {
            background: #dc3545;
            color: white;
        }
        
        .device-info {
            margin-bottom: 15px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .info-label {
            color: #666;
            font-size: 13px;
        }
        
        .info-value {
            color: #333;
            font-weight: 600;
            font-size: 13px;
        }
        
        .device-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }
        
        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
            flex: 1;
        }
        
        .stats {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .stats h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .stats-number {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .empty-state {
            background: white;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .empty-state h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .empty-state p {
            color: #666;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎛️ Slave Controller</h1>
            <p>設備發現與管理系統</p>
        </div>
        
        <!-- Controls -->
        <div class="controls">
            <button class="btn btn-primary" onclick="discoverDevices()">
                <span>📡</span>
                <span>發現設備</span>
            </button>
            <button class="btn btn-secondary" onclick="refreshDevices()">
                <span>🔄</span>
                <span>刷新列表</span>
            </button>
            <button class="btn btn-success" onclick="startStreamTest()">
                <span>▶️</span>
                <span>測試 Streaming</span>
            </button>
            <button class="btn btn-secondary" onclick="stopStreamTest()">
                <span>⏹️</span>
                <span>停止 Streaming</span>
            </button>
        </div>
        
        <!-- Device Grid -->
        <div id="deviceContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在載入設備列表...</p>
            </div>
        </div>
    </div>

    <script>
        let devices = {};
        let autoRefreshInterval = null;
        
        
        // 頁面載入時初始化
        window.onload = function() {
            refreshDevices();
            // 啟動自動刷新 (每 3 秒)
            autoRefreshInterval = setInterval(refreshDevices, 3000);
        };
        
        // 發現設備
        async function discoverDevices() {
            try {
                const response = await fetch('/slave/api/discover/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                
                const result = await response.json();
                
                if (result.ok) {
                    console.log('✅ 發現廣播已發送');
                    // 等待 1 秒後刷新列表
                    setTimeout(refreshDevices, 1000);
                } else {
                    console.error('❌ 發現失敗:', result.err);
                    alert('發現失敗: ' + result.err);
                }
            } catch (error) {
                console.error('❌ 請求錯誤:', error);
                alert('請求錯誤: ' + error.message);
            }
        }
        
        // 刷新設備列表
        async function refreshDevices() {
            try {
                const response = await fetch('/slave/api/devices/');
                const result = await response.json();
                
                if (result.ok) {
                    devices = result.devices;
                    renderDevices();
                }
            } catch (error) {
                console.error('❌ 刷新失敗:', error);
            }
        }
        
        // 渲染設備列表
        function renderDevices() {
            const container = document.getElementById('deviceContainer');
            const deviceCount = Object.keys(devices).length;
            
            if (deviceCount === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>📭 未發現任何設備</h3>
                        <p>請點擊「發現設備」按鈕開始搜尋</p>
                        <button class="btn btn-primary" onclick="discoverDevices()">
                            📡 發現設備
                        </button>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="device-grid">';
            
            for (const [slaveId, device] of Object.entries(devices)) {
                const statusClass = device.ws_connected ? 'status-online' : 
                                  device.status === 'discovered' ? 'status-discovered' : 'status-offline';
                const statusText = device.ws_connected ? 'Online' : 
                                 device.status === 'discovered' ? 'Discovered' : 'Offline';
                
                html += `
                    <div class="device-card">
                        <div class="device-header">
                            <div class="device-id">${slaveId}</div>
                            <div class="status-badge ${statusClass}">${statusText}</div>
                        </div>
                        
                        <div class="device-info">
                            <div class="info-row">
                                <span class="info-label">IP 地址</span>
                                <span class="info-value">${device.ip}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">像素數量</span>
                                <span class="info-value">${device.pixel_count || 0}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">硬體版本</span>
                                <span class="info-value">${device.hw_version || 'N/A'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">最後發現</span>
                                <span class="info-value">${formatTime(device.last_seen)}</span>
                            </div>
                        </div>
                        
                        <div class="device-actions">
                            <button class="btn btn-primary btn-small" onclick="getStatus('${slaveId}')">
                                📊 查詢狀態
                            </button>
                            <button class="btn btn-secondary btn-small" onclick="downloadSchema('${slaveId}')">
                                📥 下載 Schema
                            </button>
                            <button class="btn btn-secondary btn-small" onclick="viewSchemas('${slaveId}')" style="flex: 0.5;">
                                📋
                            </button>
                        </div>
                    </div>
                `;
            }
            
            html += '</div>';
            
            // 添加統計信息
            html += `
                <div class="stats">
                    <h3>設備統計</h3>
                    <div class="stats-number">${deviceCount}</div>
                    <p style="color: #666;">已發現設備</p>
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        // 格式化時間
        function formatTime(isoString) {
            if (!isoString) return 'N/A';
            const date = new Date(isoString);
            const now = new Date();
            const diffMs = now - date;
            const diffSec = Math.floor(diffMs / 1000);
            
            if (diffSec < 60) return `${diffSec} 秒前`;
            if (diffSec < 3600) return `${Math.floor(diffSec / 60)} 分鐘前`;
            return date.toLocaleTimeString('zh-TW');
        }
        
        // 查詢設備狀態
        async function getStatus(slaveId) {
            try {
                const response = await fetch('/slave/api/slave/status/get/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        slave_id: slaveId,
                        query_type: 2  // 混合模式
                    })
                });
                
                const result = await response.json();
                
                if (result.ok) {
                    console.log('✅ STATUS_GET 已發送:', slaveId);
                    alert('STATUS_GET 指令已發送,請查看控制台日誌');
                } else {
                    alert('失敗: ' + result.err);
                }
            } catch (error) {
                console.error('❌ 錯誤:', error);
                alert('請求錯誤: ' + error.message);
            }
        }
        
        // 下載 Schema
        async function downloadSchema(slaveId) {
            try {
                // 顯示選擇對話框
                const schemaName = prompt(
                    '請輸入要下載的 schema 名稱:\n(可選: status, file, fs, stream)',
                    'status'
                );
                
                if (!schemaName) {
                    return;
                }
                
                console.log(`開始下載 schema: ${slaveId}/${schemaName}`);
                
                const response = await fetch('/slave/api/schema/download/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        slave_id: slaveId,
                        schema_name: schemaName
                    })
                });
                
                const result = await response.json();
                
                if (result.ok) {
                    console.log('✅ Schema 下載請求已發送:', result);
                    alert(`Schema 下載請求已發送!\n\n設備: ${slaveId}\nSchema: ${schemaName}\n\n請等待約 2-5 秒後查看列表`);
                    
                    // 2 秒後刷新設備列表
                    setTimeout(refreshDevices, 2000);
                } else {
                    alert('下載失敗: ' + result.err);
                }
            } catch (error) {
                console.error('❌ 錯誤:', error);
                alert('請求錯誤: ' + error.message);
            }
        }

        async function viewSchemas(slaveId) {
            try {
                const response = await fetch(`/slave/api/schema/list/${slaveId}/`);
                const result = await response.json();
                
                if (result.ok) {
                    if (result.schemas.length === 0) {
                        alert(`設備 ${slaveId} 未下載任何 schema\n\n請先點擊「下載 Schema」按鈕`);
                        return;
                    }
                    
                    let msg = `設備 ${slaveId} 已下載 Schema:\n\n`;
                    result.schemas.forEach((s, i) => {
                        msg += `${i + 1}. ${s.name}.json\n`;
                        msg += `   組別: ${s.group}\n`;
                        msg += `   CMD 數量: ${s.cmd_count}\n`;
                        msg += `   文件大小: ${s.size} bytes\n\n`;
                    });
                    
                    alert(msg);
                } else {
                    alert('查詢失敗: ' + result.err);
                }
            } catch (error) {
                console.error('❌ 錯誤:', error);
                alert('請求錯誤: ' + error.message);
            }
        }
        
        // 測試 Streaming (簡單計數)
        let streamTestInterval = null;
        let frameCounter = 0;
        
        async function startStreamTest() {
            if (streamTestInterval) {
                alert('Streaming 測試已在運行中');
                return;
            }
            
            // 🔥 發送 STREAM_START 到 Server
            try {
                const response = await fetch('/slave/api/stream/start/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        fps: 40,
                        pixel_count: 400
                    })
                });
                
                const result = await response.json();
                
                if (result.ok) {
                    console.log('✅ STREAM_START 已發送');
                    alert('Streaming 測試已啟動');
                    
                    // 開始模擬幀計數
                    frameCounter = 0;
                    streamTestInterval = setInterval(() => {
                        frameCounter++;
                        console.log(`📡 Frame: ${frameCounter}`);
                    }, 1000 / 40);  // 40 fps
                } else {
                    alert('啟動失敗: ' + result.err);
                }
            } catch (error) {
                console.error('❌ 請求錯誤:', error);
                alert('請求錯誤: ' + error.message);
            }
        }
        
        async function stopStreamTest() {
            if (!streamTestInterval) {
                alert('Streaming 測試未運行');
                return;
            }
            
            // 🔥 發送 STREAM_STOP 到 Server
            try {
                const response = await fetch('/slave/api/stream/stop/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                
                const result = await response.json();
                
                if (result.ok) {
                    console.log(`⏹️ STREAM_STOP 已發送 (總幀數: ${frameCounter})`);
                    alert(`Streaming 測試已停止\n總發送幀數: ${frameCounter}`);
                    
                    // 停止計數
                    clearInterval(streamTestInterval);
                    streamTestInterval = null;
                } else {
                    alert('停止失敗: ' + result.err);
                }
            } catch (error) {
                console.error('❌ 請求錯誤:', error);
                alert('請求錯誤: ' + error.message);
            }
        }
        
        // 頁面卸載時清理
        window.onbeforeunload = function() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            if (streamTestInterval) {
                clearInterval(streamTestInterval);
            }
        };
    </script>
</body>
</html>
